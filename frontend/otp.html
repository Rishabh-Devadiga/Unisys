<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supabase Email OTP Verification</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      padding: 40px;
      max-width: 450px;
      width: 100%;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      text-align: center;
      font-size: 28px;
    }

    .subtitle {
      color: #666;
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }

    #inputSection {
      display: block;
    }

    #otpSection {
      display: none;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    input[type="email"],
    input[type="text"] {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    input[type="email"]:focus,
    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
    }

    input:disabled {
      background-color: #f5f5f5;
      cursor: not-allowed;
      color: #999;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    button {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
      border: 2px solid #e0e0e0;
    }

    .btn-secondary:hover {
      background: #e8e8e8;
    }

    #resetBtn {
      display: none;
      background: #ff6b6b;
      color: white;
      width: 100%;
    }

    #resetBtn:hover {
      background: #ff5252;
    }

    .message {
      padding: 14px 16px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 14px;
      text-align: center;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .message.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }

    #userInfo {
      display: none;
      background: #f8f9fa;
      padding: 20px;
      border-radius: 6px;
      margin-bottom: 20px;
      border-left: 4px solid #667eea;
    }

    #userInfo h3 {
      color: #333;
      margin-bottom: 12px;
      font-size: 18px;
    }

    #userInfo p {
      color: #555;
      margin-bottom: 8px;
      font-size: 14px;
      word-break: break-all;
    }

    .otp-helper {
      font-size: 12px;
      color: #999;
      margin-top: 6px;
    }

    .divider {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e0e0e0;
      text-align: center;
      color: #999;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 Email Verification</h1>
    <p class="subtitle">Sign up with Supabase using Email OTP</p>

    <div id="message" class="message" style="display: none;"></div>

    <div id="userInfo"></div>

    <!-- Email Input Section -->
    <div id="inputSection">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
      </div>

      <button class="btn-primary" onclick="sendOtp()" id="sendOtpBtn">Send OTP</button>
    </div>

    <!-- OTP Input Section -->
    <div id="otpSection">
      <div class="form-group">
        <label for="otp">Enter OTP</label>
        <input type="text" id="otp" placeholder="000000">
        <div class="otp-helper">Check your email for the verification code</div>
      </div>

      <div class="button-group">
        <button class="btn-primary" onclick="verifyOtp()">Verify OTP</button>
        <button class="btn-secondary" onclick="resetForm()">Back</button>
      </div>
    </div>

    <button id="resetBtn" onclick="resetForm()">Start Over</button>

    <div class="divider">
      Powered by Supabase Auth
    </div>
  </div>

  <!-- Supabase JS Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Our Config and OTP Functions -->
  <script src="supabase-config.js"></script>
  <script src="otp.js"></script>
</body>
</html>
